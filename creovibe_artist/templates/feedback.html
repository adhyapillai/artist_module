<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Feedback - CreoVibe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary: #667eea;
            --accent: #764ba2;
            --bg: #F5F7FF;
            --card: #ffffff;
            --border: #e1e4eb;
            --text-muted: #777;
            --sidebar-w: 260px;
            --sidebar-w-sm: 60px;
            --topnav-h: 70px;
        }

        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            background: var(--bg);
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-w);
            height: 100vh;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 55%, #5c3691 100%);
            transition: width 0.25s ease;
            z-index: 999;
            overflow: hidden;
            box-shadow: 4px 0 20px rgba(102, 126, 234, .35);
        }

        .sidebar.collapsed {
            width: var(--sidebar-w-sm);
        }

        .sidebar-logo-block {
      height: 100px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid rgba(255,255,255,.15);
      overflow: hidden;
      box-sizing: border-box;
    }
    .sidebar-logo-full {
      display: block; height: 100px; width: auto; max-width: 100%; object-fit: contain;
    }
    .sidebar-logo-mini {
      display: none; height: 36px; width: 36px; object-fit: contain;
    }
    .sidebar.collapsed .sidebar-logo-block { justify-content: center; padding: 0; }
    .sidebar.collapsed .sidebar-logo-full  { display: none; }
    .sidebar.collapsed .sidebar-logo-mini  { display: block; }

        /* MENU */
        .sidebar-menu {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .menu-item {
            padding: 13px 12.5px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 15px;
            cursor: pointer;
            color: rgba(255, 255, 255, .80);
            transition: 0.2s ease;
            text-decoration: none;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, .18);
            color: #ffffff;
        }

        .menu-item.active {
            background: rgba(255, 255, 255, .25);
            color: #ffffff;
            font-weight: 600;
            border-left: 3px solid #ffffff;
        }

        .menu-item i {
            font-size: 22px;
            min-width: 22px;
            text-align: center;
        }

        .sidebar.collapsed .menu-item span {
            display: none;
        }

        .sidebar.collapsed .menu-item {
            justify-content: center;
        }

        /* TOP NAVBAR */
        .topnav {
            position: fixed;
            left: var(--sidebar-w);
            top: 0;
            height: var(--topnav-h);
            width: calc(100% - var(--sidebar-w));
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            gap: 8px;
            z-index: 998;
            transition: left 0.25s ease, width 0.25s ease;
            box-shadow: 0 3px 14px rgba(102, 126, 234, .30);
        }

        .sidebar.collapsed~.topnav {
            left: var(--sidebar-w-sm);
            width: calc(100% - var(--sidebar-w-sm));
        }

        .notif-bell-wrap {
            position: relative;
            display: inline-flex;
        }
        .notif-count-badge {
            position: absolute;
            top: -4px; right: -4px;
            background: #e74c3c;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            min-width: 16px; height: 16px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            padding: 0 3px;
            pointer-events: none;
        }
        .nav-icon {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .18);
            border: 1px solid rgba(255, 255, 255, .35);
            font-size: 22px;
            color: #ffffff;
            cursor: pointer;
            text-decoration: none;
            margin-right: 8px;
            transition: background 0.2s ease;
        }

        .nav-icon:hover {
            background: rgba(255, 255, 255, .30);
        }

        .user-profile {
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 10px 5px 6px;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, .18);
        }

        .profile-pic {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .30);
            border: 2px solid rgba(255, 255, 255, .60);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }

        /*.profile-dropdown-arrow {
            color: rgba(255, 255, 255, .85);
            font-size: 18px;
            transition: transform .3s;
            line-height: 1;
        }*/

        .user-profile:hover .profile-dropdown-arrow {
            transform: rotate(180deg);
        }

        .profile-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e1e4eb;
            box-shadow: 0 8px 30px rgba(0, 0, 0, .13);
            min-width: 190px;
            display: none;
            z-index: 1050;
            overflow: hidden;
        }

        .profile-dropdown.show {
            display: block;
            animation: fadeIn .18s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px) scale(.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .dropdown-item {
            padding: 11px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #4a5568;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s, color 0.2s;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: #f5f7fa;
            color: var(--primary);
        }

        .dropdown-item.logout {
            color: #e74c3c;
        }

        .dropdown-item.logout:hover {
            background: #fef2f2;
            color: #c0392b;
        }

        /* MAIN CONTENT */
        .dashboard {
            margin-left: var(--sidebar-w);
            margin-top: var(--topnav-h);
            padding: 28px 30px 48px;
            transition: margin-left 0.25s ease;
            min-height: calc(100vh - var(--topnav-h));
        }

        .sidebar.collapsed~.topnav+.dashboard {
            margin-left: var(--sidebar-w-sm);
        }



        /* FEEDBACK PAGE SPECIFIC STYLES */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-header h2 {
            font-size: 28px;
            color: #333;
            margin: 0;
        }

        .page-header p {
            color: #666;
            margin: 0;
            max-width: 600px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #3a5ce5;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: #f8f9fa;
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
        }

        .card-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            /* fixed 4 columns */
            gap: 20px;
            margin-bottom: 30px;
            margin-top: 22px;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-value {
            font-size: 36px;
            font-weight: 700;
            display: block;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .card-title {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Feedback Overview Cards 
        .overview-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .overview-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
        }*/

        .overview-card:hover {
            transform: translateY(-5px);
        }

        /*.card-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin: 0 auto 15px;
        }*/

        .card-icon.rating {
            background: rgba(255, 193, 7, 0.1);
            color: var(--warning);
        }

        .card-icon.feedback {
            background: rgba(74, 108, 247, 0.1);
            color: var(--primary);
        }

        .card-icon.replied {
            background: rgba(40, 167, 69, 0.1);
            color: var(--success);
        }

        .card-icon.pending {
            background: rgba(220, 53, 69, 0.1);
            color: var(--danger);
        }

        /*.card-label {
            color: #666;
            font-size: 14px;
            margin: 0;
        }*/

        /* Feedback Filters */
        .feedback-filters {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .filters-container h3 {
            font-size: 18px;
            color: #333;
            margin: 0 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-tabs {
            display: flex;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 5px;
            margin-bottom: 20px;
            width: fit-content;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 10px 25px;
            border: none;
            background: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .filter-tab.active {
            background: var(--primary);
            color: white;
        }

        .filter-tab:hover:not(.active) {
            background: rgba(74, 108, 247, 0.1);
        }

        .filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        .filter-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #555;
            padding: 8px 12px;
            border-radius: 8px;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }

        .filter-checkbox:hover {
            background: #e9ecef;
        }

        .filter-checkbox input[type="checkbox"] {
            margin: 0;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .filter-checkbox.checked {
            background: rgba(74, 108, 247, 0.1);
            color: var(--primary);
            font-weight: 500;
        }

        .rating-filter {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        .rating-filter label {
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }

        .star-rating {
            display: flex;
            gap: 5px;
        }

        .star-rating i {
            font-size: 20px;
            color: #ddd;
            cursor: pointer;
            transition: color 0.2s;
        }

        .star-rating i.active {
            color: #ffc107;
        }

        .star-rating i:hover {
            color: #ffc107;
        }

        /* Feedback List */
        .feedback-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .feedback-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .feedback-header h3 {
            margin: 0;
            color: #333;
            font-size: 20px;
        }

        .feedback-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* Feedback Items */
        .feedback-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .feedback-item {
            display: flex;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #f0f0f0;
            transition: all 0.3s ease;
            position: relative;
        }

        .feedback-item:hover {
            background: #f8f9fa;
            border-color: var(--border);
            transform: translateY(-2px);
        }

        .feedback-item.unread {
            background: rgba(74, 108, 247, 0.05);
            border-left: 4px solid var(--primary);
        }

        .feedback-item.read {
            opacity: 0.9;
        }

        .feedback-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            margin-right: 20px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .feedback-content {
            flex: 1;
        }

        .feedback-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .client-info h4 {
            font-size: 18px;
            color: #333;
            margin: 0 0 5px 0;
        }

        .client-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 8px;
        }

        .stars {
            display: flex;
            gap: 2px;
        }

        .stars i {
            font-size: 16px;
            color: #ffc107;
        }

        .rating-value {
            font-size: 14px;
            color: #666;
            margin-left: 8px;
        }

        .feedback-time {
            font-size: 12px;
            color: #666;
            white-space: nowrap;
        }

        .feedback-message {
            color: #555;
            font-size: 15px;
            line-height: 1.6;
            margin: 0 0 15px 0;
        }

        .booking-info {
            font-size: 13px;
            color: #666;
            margin: 10px 0;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 6px;
            display: inline-block;
        }

        .feedback-actions-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .feedback-action-btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .feedback-action-btn.reply {
            background: #e7f3ff;
            color: var(--primary);
        }

        .feedback-action-btn.reply:hover {
            background: #d0e7ff;
        }

        .feedback-action-btn.delete {
            background: #f8d7da;
            color: #721c24;
        }

        .feedback-action-btn.delete:hover {
            background: #f1b0b7;
        }

        .feedback-action-btn.flag {
            background: #fff3cd;
            color: #856404;
        }

        .feedback-action-btn.flag:hover {
            background: #ffeaa7;
        }

        .feedback-reply {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .reply-header {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .reply-content {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            color: #555;
            font-size: 14px;
            line-height: 1.5;
        }

        /* Reply Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 0;
            width: 90%;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 25px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            color: #333;
            font-size: 20px;
        }

        .close-modal {
            font-size: 28px;
            color: #666;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        .close-modal:hover {
            color: #333;
        }

        .modal-body {
            padding: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
        }

        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.1);
        }

        .modal-footer {
            padding: 20px 25px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state i {
            font-size: 60px;
            color: #ddd;
            margin-bottom: 20px;
        }

        .empty-state h4 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #333;
        }

        .empty-state p {
            margin: 0;
            max-width: 400px;
            margin: 0 auto 20px;
        }

        /* Analytics Section */
        .analytics-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .analytics-container h3 {
            font-size: 18px;
            color: #333;
            margin: 0 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .analytics-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
        }

        .analytics-card h4 {
            font-size: 16px;
            color: #333;
            margin: 0 0 15px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rating-distribution {
            margin-top: 20px;
        }

        .rating-bar {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .rating-label {
            width: 80px;
            font-size: 14px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .rating-bar-inner {
            flex: 1;
            height: 10px;
            background: #e9ecef;
            border-radius: 5px;
            overflow: hidden;
            margin: 0 15px;
        }

        .rating-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 5px;
        }

        .rating-count {
            width: 40px;
            font-size: 14px;
            color: #666;
            text-align: right;
        }

        /* LOADING & ERROR STATES */
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 50px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none !important;
        }

        .error-box {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 10px;
            text-align: center;

    <!-- FEEDBACK CONTENT -->
    <div class="dashboard">

        <div class="spinner" id="loadingSpinner"></div>

        <div id="feedbackContent" class="hidden">
            <!-- Feedback Overview Cards -->
            <!--<div class="overview-cards">
                <div class="overview-card">
                    <div class="card-icon rating">

            <div class="card-row">

                <div class="card">
                    <div class="card-value" id="avgRating">0.0</div>
                    <div class="card-title">Rating</div>
                </div>

                <div class="card">
                    <div class="card-value" id="totalFeedback">0</div>
                    <div class="card-title">Feedbacks</div>
                </div>

            </div>

            <!-- Feedback List -->
            <div class="feedback-container">
                <div class="feedback-header">
                    <h3>Customer Reviews & Feedback</h3>
                </div>

                <div class="feedback-list" id="feedbackList">
                    <!-- Feedback items will be populated here -->
                </div>

                <div id="emptyFeedback" class="empty-state hidden">
                    <i class="ri-chat-3-line"></i>
                    <h4>No feedback yet</h4>
                </div>
            </div>
        </div>

        <div id="errorContainer" class="hidden"></div>
    </div>

    <script>
        // ==================== COMMON FUNCTIONS ====================
        async function checkLogin() {
            try {
                const response = await fetch('/api/check_session');
                const data = await response.json();

                if (!data.logged_in) {
                    localStorage.clear();
                    window.location.href = 'login.html';
                    return false;
                }

                if (!localStorage.getItem('artist_id')) {
                    localStorage.setItem('artist_id', data.artist_id);
                }

                window.__artistProfilePic = data.profile_pic || '';
                if (data.user_initials) {
                    updateUserInitials(data.user_initials, data.profile_pic);
                }

                return true;
            } catch (error) {
                localStorage.clear();
                window.location.href = 'login.html';
                return false;
            }
        }

        function initSidebar() {
            const sidebar = document.getElementById('sidebar');
            const menuBtn = document.getElementById('menuBtn');

            if (menuBtn && sidebar) {
                menuBtn.onclick = () => {
                    sidebar.classList.toggle('collapsed');
                    localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
                };

                if (localStorage.getItem('sidebarCollapsed') === 'true') {
                    sidebar.classList.add('collapsed');
                }
            }
        }

        // Profile dropdown functionality
        function initProfileDropdown() {
            const userProfile = document.getElementById('userProfile');
            const dropdown = document.getElementById('profileDropdown');

            userProfile.addEventListener('click', function (e) {
                e.stopPropagation();
                dropdown.classList.toggle('show');
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', function () {
                dropdown.classList.remove('show');
            });
        }

        // Logout function
        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
            } catch (error) {
                console.error('Logout error:', error);
            }
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // ==================== FEEDBACK FUNCTIONS ====================
        let allFeedback = [];


        async function loadFeedbackData() {
            try {
                const response = await fetch('/api/feedback');
                if (response.status === 401) {
                    localStorage.clear();
                    window.location.href = 'login.html';
                    return;
                }

                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.error || 'Failed to load feedback');
                }

                document.getElementById('loadingSpinner').classList.add('hidden');
                document.getElementById('feedbackContent').classList.remove('hidden');

                allFeedback = (data.feedback || []).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                updateFeedbackStats(allFeedback);
                displayFeedback(allFeedback);
            } catch (error) {
                console.error('Feedback error:', error);
                document.getElementById('loadingSpinner').classList.add('hidden');

                const errorDiv = document.getElementById('errorContainer');
                errorDiv.classList.remove('hidden');
                errorDiv.innerHTML = `
            <div class="error-box">
                <h3><i class="ri-error-warning-line"></i> Error Loading Feedback</h3>
                <p>${error.message}</p>
                <button onclick="loadFeedbackData()" style="
                    background: #667eea; 
                    color: white; 
                    border: none; 
                    padding: 10px 20px; 
                    border-radius: 8px; 
                    cursor: pointer;
                    margin-top: 10px;
                ">
                    <i class="ri-refresh-line"></i> Retry
                </button>
            </div>
        `;
            }
        }

        function updateFeedbackStats(feedback) {
            const total = feedback.length;
            const totalRating = feedback.reduce((sum, f) => sum + (Number(f.rating) || 0), 0);
            const avgRating = total > 0 ? (totalRating / total).toFixed(1) : '0.0';

            document.getElementById('avgRating').textContent = avgRating;
            document.getElementById('totalFeedback').textContent = total;
        }

        function displayFeedback(feedback) {
            const feedbackList = document.getElementById('feedbackList');
            const emptyState = document.getElementById('emptyFeedback');

            if (feedback.length === 0) {
                feedbackList.style.display = 'none';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            feedbackList.style.display = 'block';
            feedbackList.innerHTML = '';

            feedback.forEach(item => {
                const feedbackItem = document.createElement('div');
                feedbackItem.className = 'feedback-item read';

                const rating = Number(item.rating) || 0;
                const timeStr = formatTimeAgo(item.timestamp);
                const starsHtml = Array.from({ length: 5 }, (_, i) =>
                    `<i class="ri-star-${i < rating ? 'fill' : 'line'}" style="color: #ffc107;"></i>`
                ).join('');
                const initials = item.client_initials || (item.client_name || 'C').split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
                const clientLink = item.client_id
                    ? `client_profile.html?client_id=${encodeURIComponent(item.client_id)}&name=${encodeURIComponent(item.client_name || 'Client')}`
                    : `client_profile.html?name=${encodeURIComponent(item.client_name || 'Client')}`;

                feedbackItem.innerHTML = `
            <div class="feedback-avatar" style="background: ${getRandomColor(initials)}">
                ${initials}
            </div>
            <div class="feedback-content">
                <div class="feedback-header-row">
                    <div class="client-info">
                        <h4><a href="${clientLink}" style="color: var(--primary); text-decoration: none;">${item.client_name || 'Client'}</a></h4>
                        <div class="client-rating">
                            <div class="stars">
                                ${starsHtml}
                            </div>
                            <span class="rating-value">${rating.toFixed(1)}</span>
                        </div>
                    </div>
                    <div class="feedback-time">${timeStr}</div>
                </div>
                
                <p class="feedback-message">${item.message || ''}</p>
            </div>
        `;

                feedbackList.appendChild(feedbackItem);
            });
        }

        function formatTimeAgo(date) {
            const now = new Date();
            const feedbackDate = new Date(date);
            const diffMs = now - feedbackDate;
            const diffSec = Math.floor(diffMs / 1000);
            const diffMin = Math.floor(diffSec / 60);
            const diffHour = Math.floor(diffMin / 60);
            const diffDay = Math.floor(diffHour / 24);

            if (diffSec < 60) {
                return 'Just now';
            } else if (diffMin < 60) {
                return `${diffMin} minute${diffMin !== 1 ? 's' : ''} ago`;
            } else if (diffHour < 24) {
                return `${diffHour} hour${diffHour !== 1 ? 's' : ''} ago`;
            } else if (diffDay < 7) {
                return `${diffDay} day${diffDay !== 1 ? 's' : ''} ago`;
            } else {
                return feedbackDate.toLocaleDateString('en-IN', {
                    day: 'numeric',
                    month: 'short',
                    year: 'numeric'
                });
            }
        }

        function getRandomColor(initials) {
            const colors = [
                'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                'linear-gradient(135deg, #FF6B6B, #FF8E53)',
                'linear-gradient(135deg, #4CAF50, #8BC34A)',
                'linear-gradient(135deg, #2196F3, #21CBF3)',
                'linear-gradient(135deg, #9C27B0, #E91E63)'
            ];

            // Use initials to get consistent color for same client
            const charSum = initials.split('').reduce((sum, char) => sum + char.charCodeAt(0), 0);
            return colors[charSum % colors.length];
        }


        function updateUserInitials(initials, profilePic) {
            const sidebarLogo = document.getElementById('sidebarLogo');
            if (sidebarLogo) {
                sidebarLogo.innerHTML = '';
                const brandLogo = document.createElement('img');
                brandLogo.src = "{{ url_for('static', filename='images/logo.png') }}";
                brandLogo.alt = 'CreoVibe';
                brandLogo.style.width = '100%';
                brandLogo.style.height = '100%';
                brandLogo.style.objectFit = 'cover';
                brandLogo.style.borderRadius = '50%';
                brandLogo.onerror = () => { sidebarLogo.textContent = 'CV'; };
                sidebarLogo.appendChild(brandLogo);
            }

            const navProfile = document.getElementById('navProfilePic');
            if (!navProfile) return;

            const resolvedInitials = (initials || 'CV').toUpperCase();
            const pic = profilePic || window.__artistProfilePic || '';
            if (pic) {
                navProfile.textContent = '';
                navProfile.style.backgroundImage = `url('${pic}')`;
                navProfile.style.backgroundSize = 'cover';
                navProfile.style.backgroundPosition = 'center';
                navProfile.style.color = 'transparent';
            } else {
                navProfile.style.backgroundImage = '';
                navProfile.style.backgroundSize = '';
                navProfile.style.backgroundPosition = '';
                navProfile.style.color = '';
                navProfile.textContent = resolvedInitials;
            }
        }

        // ==================== EVENT LISTENERS ====================
        function setupEventListeners() {
            document.getElementById('logoutBtn').addEventListener('click', function (e) {
                e.preventDefault();
                logout();
            });
        }

        // ==================== INITIALIZE ====================

        async function loadNotificationCount() {
            try {
                const r = await fetch('/api/notifications/count');
                if (!r.ok) return;
                const d = await r.json();
                const count = d.unread || 0;
                const label = count > 99 ? '99+' : String(count);
                const badge = document.getElementById('notifCountBadge');
                if (badge) {
                    if (count > 0) { badge.textContent = label; badge.style.display = 'flex'; }
                    else { badge.style.display = 'none'; }
                }
                const sbBadge = document.getElementById('sidebarNotifBadge');
                if (sbBadge) {
                    if (count > 0) { sbBadge.textContent = label; sbBadge.style.display = 'flex'; }
                    else { sbBadge.style.display = 'none'; }
                }
            } catch (e) { /* silent */ }
        }
        async function init() {
            const isLoggedIn = await checkLogin();
            if (!isLoggedIn) return;

            initSidebar();
            initProfileDropdown();
            setupEventListeners();
            loadFeedbackData();
            loadNotificationCount();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
