<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password - CreoVibe</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
:root {
    --primary: #667eea;
    --accent: #764ba2;
    --bg: #F5F7FF;
}
body {
    margin: 0;
    font-family: Inter, Arial, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.forgot-container { width: 100%; max-width: 480px; }
.back-btn {
    position: absolute; top: 30px; left: 30px;
    color: #667eea; text-decoration: none;
    display: flex; align-items: center; gap: 8px; font-weight: 500;
}
.forgot-card {
    background: white; border-radius: 20px; padding: 40px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}
.logo-area { text-align: center; margin-bottom: 24px; }
.logo-circle {
    width: 70px; height: 70px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 50%; margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 28px; transition: 0.3s;
}
.logo-text { font-family: "Monotype Corsiva", cursive; font-size: 32px; color: #667eea; margin-bottom: 6px; }
.tagline { color: #666; font-size: 14px; }
.form-group { margin-bottom: 20px; }
.form-label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
.form-control {
    width: 100%; padding: 14px 16px; border: 2px solid #e1e4eb;
    border-radius: 10px; font-size: 16px; transition: 0.3s; box-sizing: border-box;
}
.form-control:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
.otp-input { text-align: center; font-size: 1.6rem; letter-spacing: 10px; font-weight: 700; }
.btn-primary {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border: none; border-radius: 10px;
    font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
}
.btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102,126,234,0.2); }
.btn-primary:disabled { opacity: 0.65; cursor: not-allowed; }
.btn-secondary {
    width: 100%; padding: 16px; background: white; color: #667eea;
    border: 2px solid #667eea; border-radius: 10px;
    font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 12px;
}
.btn-secondary:hover { background: #F5F7FF; }
.msg {
    padding: 14px; border-radius: 10px; margin-bottom: 16px;
    display: none; text-align: center; font-size: 14px;
}
.msg.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
.msg.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
.step-hint { font-size: 13px; color: #888; text-align: center; margin-top: 10px; }
.step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
.step-dot { width: 10px; height: 10px; border-radius: 50%; background: #e1e4eb; transition: background 0.3s; }
.step-dot.active { background: #667eea; }
.step-dot.done   { background: #28a745; }
.pw-wrap { position: relative; }
.pw-toggle {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: #888; cursor: pointer; font-size: 18px; padding: 0;
}
.hidden { display: none !important; }
</style>
</head>

<body>
<a href="login.html" class="back-btn"><i class="ri-arrow-left-line"></i> Back to Login</a>

<div class="forgot-container">
    <div class="forgot-card">

        <div class="logo-area">
            <div class="logo-circle" id="stepIcon"><i class="ri-lock-line"></i></div>
            <div class="logo-text">CreoVibe</div>
            <div class="tagline" id="stepTagline">Enter your email to receive an OTP</div>
        </div>

        <div class="step-indicator">
            <div class="step-dot active" id="dot1"></div>
            <div class="step-dot" id="dot2"></div>
            <div class="step-dot" id="dot3"></div>
        </div>

        <div class="msg" id="msgBox"></div>

        <!-- STEP 1: Email -->
        <div id="step1">
            <div class="form-group">
                <label class="form-label">Registered Email</label>
                <input type="email" class="form-control" id="emailInput"
                       placeholder="Enter your registered email" required autofocus>
            </div>
            <button class="btn-primary" id="sendOtpBtn" onclick="sendOtp()">
                <i class="ri-mail-send-line"></i> Send OTP
            </button>
            <p class="step-hint">Step 1 of 3 &mdash; Enter your registered email</p>
        </div>

        <!-- STEP 2: OTP -->
        <div id="step2" class="hidden">
            <div class="form-group">
                <label class="form-label">One Time Password</label>
                <input type="text" class="form-control otp-input" id="otpInput"
                       maxlength="6" placeholder="&bull; &bull; &bull; &bull; &bull; &bull;"
                       autocomplete="one-time-code"
                       oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                <div class="step-hint" style="margin-top:8px;">
                    <i class="ri-timer-line"></i> Valid for 5 minutes
                </div>
            </div>
            <button class="btn-primary" id="verifyOtpBtn" onclick="verifyOtp()">
                <i class="ri-shield-check-line"></i> Verify OTP
            </button>
            <button class="btn-secondary" onclick="backToStep1()">
                <i class="ri-arrow-left-line"></i> Resend OTP
            </button>
            <p class="step-hint">Step 2 of 3 &mdash; Enter the OTP sent to your email</p>
        </div>

        <!-- STEP 3: New Password -->
        <div id="step3" class="hidden">
            <div class="form-group">
                <label class="form-label">New Password</label>
                <div class="pw-wrap">
                    <input type="password" class="form-control" id="newPassInput"
                           placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
                    <button type="button" class="pw-toggle" onclick="togglePw('newPassInput',this)">
                        <i class="ri-eye-line"></i>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="pw-wrap">
                    <input type="password" class="form-control" id="confirmPassInput"
                           placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
                    <button type="button" class="pw-toggle" onclick="togglePw('confirmPassInput',this)">
                        <i class="ri-eye-line"></i>
                    </button>
                </div>
            </div>
            <div class="step-hint" style="margin-bottom:16px;">
                8+ chars &bull; uppercase &bull; lowercase &bull; number &bull; special character
            </div>
            <button class="btn-primary" id="resetBtn" onclick="resetPassword()">
                <i class="ri-check-line"></i> Reset Password
            </button>
            <p class="step-hint">Step 3 of 3 &mdash; Set your new password</p>
        </div>

    </div>
</div>

<script>
function showMsg(text, type) {
    var el = document.getElementById('msgBox');
    el.textContent = text;
    el.className = 'msg ' + type;
    el.style.display = 'block';
}
function clearMsg() {
    var el = document.getElementById('msgBox');
    el.style.display = 'none';
}
function setLoading(btnId, loading, original) {
    var btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? '<i class="ri-loader-4-line"></i> Please wait...' : original;
}
function togglePw(id, btn) {
    var el = document.getElementById(id);
    var show = el.type === 'password';
    el.type = show ? 'text' : 'password';
    btn.querySelector('i').className = show ? 'ri-eye-off-line' : 'ri-eye-line';
}
function setStep(n) {
    [1,2,3].forEach(function(i) {
        document.getElementById('step'+i).classList.add('hidden');
        var dot = document.getElementById('dot'+i);
        dot.className = 'step-dot';
        if (i < n)  dot.classList.add('done');
        if (i === n) dot.classList.add('active');
    });
    document.getElementById('step'+n).classList.remove('hidden');
    var icons    = ['ri-lock-line','ri-shield-check-line','ri-key-line'];
    var taglines = [
        'Enter your email to receive an OTP',
        'Enter the OTP sent to your email',
        'Choose a strong new password'
    ];
    document.getElementById('stepIcon').innerHTML = '<i class="'+icons[n-1]+'"></i>';
    document.getElementById('stepTagline').textContent = taglines[n-1];
    clearMsg();
}
function backToStep1() { setStep(1); }

async function sendOtp() {
    var email = document.getElementById('emailInput').value.trim();
    if (!email) { showMsg('Please enter your registered email.', 'error'); return; }
    setLoading('sendOtpBtn', true, '<i class="ri-mail-send-line"></i> Send OTP');
    try {
        var resp = await fetch('/api/forgot_password/send_otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email })
        });
        var data = await resp.json();
        if (data.success) {
            setStep(2);
            showMsg(data.message || 'OTP sent. Check your email.', 'success');
        } else {
            showMsg(data.error || 'Failed to send OTP. Please try again.', 'error');
        }
    } catch(e) {
        showMsg('Network error. Please try again.', 'error');
    } finally {
        setLoading('sendOtpBtn', false, '<i class="ri-mail-send-line"></i> Send OTP');
    }
}

async function verifyOtp() {
    var otp = document.getElementById('otpInput').value.trim();
    if (!otp || otp.length < 6) { showMsg('Please enter the 6-digit OTP.', 'error'); return; }
    setLoading('verifyOtpBtn', true, '<i class="ri-shield-check-line"></i> Verify OTP');
    try {
        var resp = await fetch('/api/forgot_password/verify_otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ otp: otp })
        });
        var data = await resp.json();
        if (data.success) {
            setStep(3);
            showMsg('OTP verified! Set your new password below.', 'success');
        } else {
            showMsg(data.error || 'Invalid OTP. Please try again.', 'error');
        }
    } catch(e) {
        showMsg('Network error. Please try again.', 'error');
    } finally {
        setLoading('verifyOtpBtn', false, '<i class="ri-shield-check-line"></i> Verify OTP');
    }
}

async function resetPassword() {
    var newPass = document.getElementById('newPassInput').value;
    var confirm = document.getElementById('confirmPassInput').value;
    if (!newPass || !confirm) { showMsg('Please fill in both password fields.', 'error'); return; }
    if (newPass !== confirm)  { showMsg('Passwords do not match.', 'error'); return; }
    setLoading('resetBtn', true, '<i class="ri-check-line"></i> Reset Password');
    try {
        var resp = await fetch('/api/forgot_password/reset_password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ new_password: newPass, confirm_password: confirm })
        });
        var data = await resp.json();
        if (data.success) {
            showMsg('Password reset successfully! Redirecting to login...', 'success');
            setTimeout(function() { window.location.href = 'login.html'; }, 2000);
        } else {
            showMsg(data.error || 'Failed to reset password. Please try again.', 'error');
        }
    } catch(e) {
        showMsg('Network error. Please try again.', 'error');
    } finally {
        setLoading('resetBtn', false, '<i class="ri-check-line"></i> Reset Password');
    }
}

// Enter key support
document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    if (!document.getElementById('step1').classList.contains('hidden')) sendOtp();
    else if (!document.getElementById('step2').classList.contains('hidden')) verifyOtp();
    else if (!document.getElementById('step3').classList.contains('hidden')) resetPassword();
});
</script>
</body>
</html>
